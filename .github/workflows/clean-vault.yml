name: 🔱 G-GHOST ETERNAL GUARDIAN (24/7 CLEANER)

on:
  schedule:
    - cron: '0 * * * *'  # हर 1 घंटे में एक बार सफाई करेगा
  workflow_dispatch:      # जब आपका मन करे तब मैन्युअली बटन दबाकर चलाने के लिए

jobs:
  patrol-vault:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Cloning Sora2 Repo
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Extraction Tools
        run: npm install node-fetch@2

      - name: 🛡️ Launching Guardian Strike
        run: node cleaner.js
