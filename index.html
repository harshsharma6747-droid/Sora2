<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 G-GHOST | V28 ETERNAL-GUARDIAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --yt-red: #FF0000; --bg: #050505; --card: #111; --text: #ffffff; --neon: #00f2ff; --gold: #FFD700; --live: #00ff41; --dead: #ff3131; --space2: #bc13fe; --guardian: #ffae00; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .app-bar { background: rgba(0,0,0,0.95); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10000; border-bottom: 1px solid #222; backdrop-filter: blur(20px); }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); transition: 0.3s; }
        
        /* 🔱 Guardian Mode UI */
        .guardian-active { border: 2px solid var(--guardian) !important; box-shadow: 0 0 30px var(--guardian) !important; }
        #guardian-status-bar { display: none; background: var(--guardian); color: #000; padding: 5px 15px; font-size: 10px; font-weight: 900; text-align: center; letter-spacing: 2px; }

        #active-task-bar { background: #111; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; font-size: 11px; color: #888; justify-content: space-between; }
        .control-panel { display: flex; gap: 8px; padding: 12px; overflow-x: auto; background: #000; border-bottom: 1px solid #222; position: sticky; top: 60px; z-index: 9000; }
        .p-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 18px; border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-guardian { background: #000; border: 1px solid var(--guardian); color: var(--guardian); }
        .btn-guardian.on { background: var(--guardian); color: #000; }

        #video-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px; }
        .video-card { position: relative; background: var(--card); border-radius: 15px; border: 2px solid #222; overflow: hidden; transition: 0.3s; }
        .video-card.selected { border-color: var(--neon); }
        
        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; cursor: pointer; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-meta { padding: 10px; font-size: 10px; color: #aaa; height: 30px; overflow: hidden; line-height: 1.2; }
        
        #progress-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pg-bar { width: 80%; background:#222; height:8px; border-radius:10px; margin: 20px 0; }
        .pg-fill { width: 0%; height: 100%; background: var(--neon); transition: 0.4s; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="guardian-status-bar">🛡️ GUARDIAN MODE ACTIVE: AUTO-SCANNING SYSTEM 24/7</div>

<div class="app-bar">
    <div class="logo" id="main-logo">🔱 G-GHOST <span style="font-size:10px;">V28 ETERNAL</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleGuardian()" class="p-btn btn-guardian" id="guardian-master-btn">🛡️ GUARDIAN MODE: OFF</button>
        <button onclick="switchSpace()" class="p-btn" style="border-color:var(--gold); color:var(--gold);">🚀 SWITCH</button>
    </div>
</div>

<div id="active-task-bar">
    <span>📡 <span id="current-space-name">HAT-VAULT</span></span>
    <span id="total-count">0 ASSETS</span>
</div>

<div class="control-panel">
    <button class="p-btn" onclick="refreshData()">🔄 REFRESH</button>
    <button class="p-btn" onclick="selectAll()">✅ ALL</button>
    <button class="p-btn" onclick="clearQueue()">❌ CLEAR</button>
    <button class="p-btn" style="border-color:var(--dead); color:var(--dead);" onclick="cleanDeadLinks()">💀 MANUAL PURGE</button>
</div>

<div id="video-feed"></div>

<div id="progress-overlay">
    <div id="pg-percent" style="font-size:60px; font-weight:900; color:var(--neon);">0%</div>
    <div class="pg-bar"><div id="pg-fill" class="pg-fill"></div></div>
    <p id="pg-status" style="font-size:12px; color:var(--gold); font-family:monospace;"></p>
</div>

<script>
    const SPACES = [
        { name: "HAT-VAULT", url: "https://hat-e9d2d-default-rtdb.firebaseio.com/sora_vault", color: "#00f2ff" },
        { name: "BOMB-VAULT", url: "https://bomb-aa638-default-rtdb.firebaseio.com/sora_vault", color: "#bc13fe" }
    ];

    let currentSpaceIdx = 0;
    let masterData = [];
    let queue = [];
    let guardianActive = false;
    let wakeLock = null;

    // 🔱 GUARDIAN MODE ENGINE (24/7 Loop)
    async function toggleGuardian() {
        guardianActive = !guardianActive;
        const btn = document.getElementById('guardian-master-btn');
        const bar = document.getElementById('guardian-status-bar');
        
        if (guardianActive) {
            btn.innerText = "🛡️ GUARDIAN MODE: ON";
            btn.classList.add('on');
            bar.style.display = 'block';
            document.body.classList.add('guardian-active');
            requestWakeLock();
            startEternalLoop();
        } else {
            btn.innerText = "🛡️ GUARDIAN MODE: OFF";
            btn.classList.remove('on');
            bar.style.display = 'none';
            document.body.classList.remove('guardian-active');
            if (wakeLock) wakeLock.release();
        }
    }

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.log("WakeLock Failed"); }
    }

    async function startEternalLoop() {
        while (guardianActive) {
            console.log("Guardian: Starting full cycle...");
            
            // 1. Sync both spaces one by one
            for (let i = 0; i < SPACES.length; i++) {
                if (!guardianActive) break;
                currentSpaceIdx = i;
                updateUISpace();
                await refreshData();
                
                // 2. Scan and clean dead links automatically
                await autoCleanSilence();
                
                // 3. Cooldown between spaces
                await new Promise(r => setTimeout(r, 5000));
            }
            
            // 4. Eternal Cooldown (Wait 5 minutes before next full cycle)
            console.log("Guardian: Cycle complete. Sleeping for 5 mins...");
            for(let m=0; m<300; m++) {
                if(!guardianActive) break;
                await new Promise(r => setTimeout(r, 1000));
            }
        }
    }

    // Silence mode auto-cleaner
    async function autoCleanSilence() {
        let dead = 0;
        for(let i=0; i < masterData.length; i++) {
            if (!guardianActive) break;
            try {
                const res = await fetch(masterData[i].clean, { method: 'HEAD' });
                if(!res.ok) throw "Dead";
            } catch (e) {
                dead++;
                await fetch(`${SPACES[currentSpaceIdx].url}/${masterData[i].dbPath}.json`, { method: 'DELETE' });
            }
        }
        console.log(`Guardian: Removed ${dead} dead links from ${SPACES[currentSpaceIdx].name}`);
    }

    // 🔱 Standard Functions (Fixed)
    function switchSpace() {
        currentSpaceIdx = currentSpaceIdx === 0 ? 1 : 0;
        updateUISpace();
        refreshData();
    }

    function updateUISpace() {
        const s = SPACES[currentSpaceIdx];
        document.getElementById('current-space-name').innerText = s.name;
        document.getElementById('current-space-name').style.color = s.color;
        document.documentElement.style.setProperty('--neon', s.color);
    }

    async function refreshData() {
        const s = SPACES[currentSpaceIdx];
        try {
            const res = await fetch(`${s.url}.json?nocache=${Date.now()}`);
            const data = await res.json();
            let temp = [];
            function traverse(obj, path = "") {
                for (let key in obj) {
                    let item = obj[key];
                    let curPath = path ? `${path}/${key}` : key;
                    if (item && typeof item === 'object') {
                        const vUrl = item.clean || item.original_url || item.url;
                        if (vUrl) {
                            temp.push({ id: key, dbPath: curPath, clean: vUrl, thumb: item.thumb || '', prompt: item.prompt || 'Untitled', time: item.timestamp || 0 });
                        } else traverse(item, curPath);
                    }
                }
            }
            if(data) traverse(data);
            masterData = temp.sort((a,b) => b.time - a.time);
            document.getElementById('total-count').innerText = masterData.length + " ASSETS";
            if(!guardianActive) renderView();
        } catch (e) {}
    }

    function renderView() {
        const feed = document.getElementById('video-feed');
        feed.innerHTML = masterData.map(item => `
            <div class="video-card">
                <div class="thumb-container"><img class="thumb-img" src="${item.thumb}" loading="lazy"></div>
                <div class="video-meta">${item.prompt}</div>
            </div>
        `).join('');
    }

    async function cleanDeadLinks() {
        const overlay = document.getElementById('progress-overlay');
        overlay.style.display = 'flex';
        await autoCleanSilence();
        overlay.style.display = 'none';
        refreshData();
    }

    function selectAll() { /* logic here */ }
    function clearQueue() { /* logic here */ }

    refreshData();
</script>
</body>
</html>
