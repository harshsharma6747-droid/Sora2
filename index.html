<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 G-GHOST | V24 VOID-STRIKE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --yt-red: #FF0000; --bg: #050505; --card: #111; --text: #ffffff; --neon: #00f2ff; --gold: #FFD700; --live: #00ff41; --dead: #ff3131; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 100px; }
        
        .app-bar { background: rgba(0,0,0,0.9); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; backdrop-filter: blur(10px); }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        #active-task-bar { background: #111; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; font-size: 11px; color: #888; justify-content: space-between; align-items: center; }

        .control-panel { display: flex; gap: 8px; padding: 10px; overflow-x: auto; background: #000; border-bottom: 1px solid #222; }
        .p-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .p-btn:active { background: var(--neon); color: #000; }
        .btn-danger { border-color: var(--dead); color: var(--dead); }

        #video-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 10px; }
        .video-card { position: relative; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .video-card.selected { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        
        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; cursor: pointer; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-actions { position: absolute; top: 5px; right: 5px; display: flex; flex-direction: column; gap: 5px; z-index: 10; }
        .mini-btn { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .video-meta { padding: 8px; font-size: 10px; color: #aaa; height: 25px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        .full-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        #progress-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .pg-bar { width: 70%; background:#222; height:6px; border-radius:10px; margin: 20px 0; }
        .pg-fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: 0.3s; }
        
        .btn-main { background: var(--neon); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        
        #player-modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; align-items: center; justify-content: center; }
        #player-modal video { width: 100%; max-height: 80vh; }

        .badge-looted { position: absolute; top: 5px; left: 5px; background: var(--live); color: #000; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-bar">
    <div class="logo">🔱 G-GHOST <span style="font-size:10px; color:var(--gold)">V24 VOID-STRIKE</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="refreshData()" style="background:none; border:none; color:white; font-size:18px;">🔄</button>
        <button onclick="openOverlay('queue-overlay')" style="background:var(--neon); border:none; color:black; padding:5px 12px; border-radius:8px; font-weight:bold;">QUEUE <span id="q-count">0</span></button>
    </div>
</div>

<div id="active-task-bar">
    <span id="node-stat">📡 STATUS: CONNECTED</span>
    <span id="total-count" style="color:var(--neon)">0 ASSETS</span>
</div>

<div class="control-panel">
    <button class="p-btn" onclick="selectAll()">✅ SELECT ALL</button>
    <button class="p-btn" onclick="clearQueue()">❌ UNSELECT ALL</button>
    <button class="p-btn btn-danger" onclick="cleanDeadLinks()">💀 CLEAN DEAD LINKS</button>
</div>

<div id="video-feed"></div>

<div id="progress-overlay">
    <div id="pg-percent" style="font-size:60px; font-weight:900; color:var(--neon);">0%</div>
    <div class="pg-bar"><div id="pg-fill" class="pg-fill"></div></div>
    <p id="pg-status" style="font-size:12px; color:var(--gold); font-family:monospace;"></p>
    <button class="btn-main" style="width:200px; background:red; color:white;" onclick="location.reload()">ABORT</button>
</div>

<div id="queue-overlay" class="full-overlay">
    <h2 style="color:var(--neon)">Ready to Export</h2>
    <div id="queue-list" style="margin-bottom:30px;"></div>
    <button class="btn-main" onclick="downloadZipTurbo()">🚀 DOWNLOAD ZIP (SAFE MODE)</button>
    <button class="btn-main" style="background:#222; color:white;" onclick="closeOverlay('queue-overlay')">CANCEL</button>
</div>

<div id="player-modal">
    <button onclick="closePlayer()" style="position:absolute; top:20px; right:20px; background:white; color:black; border:none; padding:10px 20px; border-radius:30px; font-weight:900;">CLOSE</button>
    <video id="ghost-player" controls autoplay></video>
</div>

<script>
    const FB_URL = "https://hat-e9d2d-default-rtdb.firebaseio.com/sora_vault";
    let masterData = [];
    let queue = [];
    let lootedHistory = JSON.parse(localStorage.getItem('ghost_looted_v24')) || [];

    async function refreshData() {
        try {
            const res = await fetch(`${FB_URL}.json`);
            const data = await res.json();
            if(!data) return;
            let temp = [];
            function traverse(obj, path = "") {
                for (let key in obj) {
                    let item = obj[key];
                    let curPath = path ? `${path}/${key}` : key;
                    if (item && typeof item === 'object') {
                        if (item.clean || item.original_url) {
                            temp.push({
                                id: key,
                                dbPath: curPath,
                                clean: item.clean || item.original_url,
                                thumb: item.thumb || item.thumbnailUrl || '',
                                prompt: item.prompt || 'Untitled',
                                time: item.timestamp || 0
                            });
                        } else traverse(item, curPath);
                    }
                }
            }
            traverse(data);
            masterData = temp.sort((a,b) => b.time - a.time);
            document.getElementById('total-count').innerText = masterData.length + " ASSETS";
            renderView();
        } catch (e) { console.log("Refresh Failed"); }
    }

    function renderView() {
        const feed = document.getElementById('video-feed');
        feed.innerHTML = "";
        masterData.forEach(item => {
            const isSelected = queue.some(q => q.id === item.id);
            const isLooted = lootedHistory.includes(item.id);
            const card = document.createElement('div');
            card.className = `video-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="thumb-container" onclick="toggleSelect('${item.id}')">
                    <img class="thumb-img" src="${item.thumb}" loading="lazy">
                    ${isLooted ? '<div class="badge-looted">LOOTED</div>' : ''}
                    <div class="card-actions">
                        <div class="mini-btn" onclick="openPlayer(event, '${item.clean}')">👁️</div>
                    </div>
                </div>
                <div class="video-meta">${item.prompt}</div>
            `;
            feed.appendChild(card);
        });
    }

    function toggleSelect(id) {
        const item = masterData.find(m => m.id === id);
        const idx = queue.findIndex(q => q.id === id);
        if(idx > -1) queue.splice(idx, 1); else queue.push(item);
        document.getElementById('q-count').innerText = queue.length;
        renderView();
    }

    function selectAll() { queue = [...masterData]; document.getElementById('q-count').innerText = queue.length; renderView(); }
    function clearQueue() { queue = []; document.getElementById('q-count').innerText = "0"; renderView(); }

    async function downloadZipTurbo() {
        if(queue.length === 0) return;
        const zip = new JSZip();
        const overlay = document.getElementById('progress-overlay');
        const fill = document.getElementById('pg-fill');
        const status = document.getElementById('pg-status');
        
        overlay.style.display = 'flex';
        closeOverlay('queue-overlay');

        let successCount = 0;
        const batchSize = 3; // कम बैच साइज ताकि रिक्वेस्ट फेल न हो

        for(let i=0; i < queue.length; i++) {
            status.innerText = `FETCHING (${i+1}/${queue.length}): ${queue[i].prompt.substring(0,20)}`;
            
            try {
                const response = await fetch(queue[i].clean);
                if(!response.ok) throw "Error";
                const blob = await response.blob();
                const name = `${queue[i].prompt.substring(0,20).replace(/\s/g,'_')}_${i}.mp4`;
                zip.file(name, blob);
                successCount++;
                if(!lootedHistory.includes(queue[i].id)) lootedHistory.push(queue[i].id);
            } catch (e) {
                console.log("Failed to fetch: " + queue[i].id);
            }

            let p = Math.round(((i+1) / queue.length) * 100);
            fill.style.width = p + '%';
            document.getElementById('pg-percent').innerText = p + '%';
        }

        if(successCount > 0) {
            status.innerText = "🔱 PACKING ZIP...";
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `GHOST_VAULT_${Date.now()}.zip`;
            link.click();
            localStorage.setItem('ghost_looted_v24', JSON.stringify(lootedHistory));
            alert(`Looted: ${successCount} assets successfully!`);
        } else {
            alert("No files could be downloaded. Check your internet or CORS.");
        }
        overlay.style.display = 'none';
        clearQueue();
        refreshData();
    }

    // 💀 DEAD LINKS CLEANER: केवल खराब लिंक को ही डिलीट करेगा
    async function cleanDeadLinks() {
        if(!confirm("यह बटन पूरे डेटाबेस को स्कैन करेगा और खराब लिंक्स को डिलीट कर देगा। क्या आप तैयार हैं?")) return;
        
        const overlay = document.getElementById('progress-overlay');
        const status = document.getElementById('pg-status');
        overlay.style.display = 'flex';
        let deadCount = 0;

        for(let i=0; i < masterData.length; i++) {
            status.innerText = `SCANNING (${i+1}/${masterData.length})...\nDEAD FOUND: ${deadCount}`;
            try {
                const res = await fetch(masterData[i].clean, { method: 'HEAD' });
                if(!res.ok) throw "Dead";
            } catch (e) {
                deadCount++;
                await fetch(`${FB_URL}/${masterData[i].dbPath}.json`, { method: 'DELETE' });
            }
        }
        
        overlay.style.display = 'none';
        alert(`CLEANUP COMPLETE!\nRemoved ${deadCount} dead links.`);
        refreshData();
    }

    function openPlayer(e, url) {
        e.stopPropagation();
        document.getElementById('ghost-player').src = url;
        document.getElementById('player-modal').style.display = 'flex';
    }
    function closePlayer() {
        document.getElementById('ghost-player').pause();
        document.getElementById('player-modal').style.display = 'none';
    }
    function openOverlay(id) { 
        if(id==='queue-overlay') {
            document.getElementById('queue-list').innerHTML = queue.map(i => `<div style="padding:5px; font-size:10px; border-bottom:1px solid #222;">> ${i.prompt}</div>`).join('');
        }
        document.getElementById(id).style.display = 'block'; 
    }
    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

    refreshData();
</script>
</body>
</html>
