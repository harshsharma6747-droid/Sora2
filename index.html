<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔱 G-GHOST | V29 ETERNAL-STRIKE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --yt-red: #FF0000; --bg: #050505; --card: #111; --text: #ffffff; --neon: #00f2ff; --gold: #FFD700; --live: #00ff41; --dead: #ff3131; --space2: #bc13fe; --guardian: #ffae00; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 🔱 Animations */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--neon); } 50% { box-shadow: 0 0 20px var(--neon); } 100% { box-shadow: 0 0 5px var(--neon); } }

        .app-bar { background: rgba(0,0,0,0.95); padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10000; border-bottom: 1px solid #222; backdrop-filter: blur(20px); }
        .logo { font-size: 20px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); transition: 0.3s; }
        
        #guardian-status-bar { display: none; background: var(--guardian); color: #000; padding: 6px 15px; font-size: 11px; font-weight: 900; text-align: center; letter-spacing: 2px; animation: pulse 2s infinite; }

        #active-task-bar { background: #111; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; font-size: 11px; color: #888; justify-content: space-between; font-family: monospace; }
        
        /* 🔱 Animated Buttons */
        .control-panel { display: flex; gap: 8px; padding: 12px; overflow-x: auto; background: #000; border-bottom: 1px solid #222; position: sticky; top: 60px; z-index: 9000; align-items: center; }
        .p-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px 20px; border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 5px; }
        .p-btn:active { transform: scale(0.9); background: #333; }
        .p-btn:hover { border-color: #555; }
        
        .btn-guardian { background: #000; border: 1px solid var(--guardian); color: var(--guardian); }
        .btn-guardian.on { background: var(--guardian); color: #000; box-shadow: 0 0 15px var(--guardian); }
        .btn-strike { background: var(--neon); color: #000; border: none; }
        .btn-danger { border-color: var(--dead); color: var(--dead); }

        /* 🔱 Video Grid */
        #video-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .video-card { position: relative; background: var(--card); border-radius: 15px; border: 2px solid #222; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .video-card:active { transform: scale(0.96); }
        .video-card.selected { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,242,255,0.3); background: #1a1a1a; }
        .video-card.is-looted { opacity: 0.6; filter: grayscale(0.5); }

        .thumb-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .video-meta { padding: 10px; font-size: 11px; color: #bbb; height: 30px; overflow: hidden; line-height: 1.2; font-weight: 500; }
        
        /* 🔱 Progress Overlay */
        #progress-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .pg-bar { width: 80%; background:#222; height:10px; border-radius:10px; margin: 25px 0; overflow: hidden; border: 1px solid #333; }
        .pg-fill { width: 0%; height: 100%; background: var(--neon); transition: 0.4s ease-out; box-shadow: 0 0 15px var(--neon); }

        .badge-looted { position: absolute; top: 8px; left: 8px; background: var(--live); color: #000; font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 900; z-index: 10; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="guardian-status-bar">🛡️ GUARDIAN SYSTEM ACTIVE: PATROLLING VAULTS 24/7</div>

<div class="app-bar">
    <div class="logo" id="main-logo">🔱 G-GHOST <span style="font-size:10px; color:var(--gold)">V29 ETERNAL</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleGuardian()" class="p-btn btn-guardian" id="guardian-master-btn">🛡️ GUARDIAN: OFF</button>
        <button onclick="downloadZipTurbo()" class="p-btn btn-strike" id="strike-btn">🚀 STRIKE (<span id="q-count">0</span>)</button>
    </div>
</div>

<div id="active-task-bar">
    <span>📡 SPACE: <span id="current-space-name" style="color:var(--neon)">HAT-VAULT</span></span>
    <span id="total-count">0 ASSETS</span>
</div>

<div class="control-panel">
    <button class="p-btn" onclick="switchSpace()">🔄 SWITCH SPACE</button>
    <button class="p-btn" onclick="refreshData()">🛰️ SYNC</button>
    <button class="p-btn" onclick="selectAll()">✅ ALL</button>
    <button class="p-btn" onclick="clearQueue()">❌ CLEAR</button>
    <button class="p-btn btn-danger" onclick="cleanDeadLinks()">💀 PURGE DEAD</button>
    <button class="p-btn" onclick="exportLinks()" style="border-color:var(--gold); color:var(--gold);">🔗 EXPORT TXT</button>
</div>

<div id="video-feed"></div>

<div id="progress-overlay">
    <div id="pg-percent" style="font-size:80px; font-weight:900; color:var(--neon);">0%</div>
    <div class="pg-bar"><div id="pg-fill" class="pg-fill"></div></div>
    <p id="pg-status" style="font-size:14px; color:var(--gold); font-family:monospace; text-align:center; padding:0 20px;"></p>
    <button class="p-btn btn-danger" style="margin-top:20px; padding:15px 40px;" onclick="location.reload()">ABORT MISSION</button>
</div>

<script>
    const SPACES = [
        { name: "HAT-VAULT", url: "https://hat-e9d2d-default-rtdb.firebaseio.com/sora_vault", color: "#00f2ff" },
        { name: "BOMB-VAULT", url: "https://bomb-aa638-default-rtdb.firebaseio.com/sora_vault", color: "#bc13fe" }
    ];

    let currentSpaceIdx = 0;
    let masterData = [];
    let queue = [];
    let lootedHistory = JSON.parse(localStorage.getItem('ghost_looted_v29')) || [];
    let guardianActive = false;
    let wakeLock = null;

    // 🔱 GUARDIAN ENGINE
    async function toggleGuardian() {
        guardianActive = !guardianActive;
        const btn = document.getElementById('guardian-master-btn');
        const bar = document.getElementById('guardian-status-bar');
        
        if (guardianActive) {
            btn.innerText = "🛡️ GUARDIAN: ACTIVE";
            btn.classList.add('on');
            bar.style.display = 'block';
            requestWakeLock();
            startEternalLoop();
        } else {
            btn.innerText = "🛡️ GUARDIAN: OFF";
            btn.classList.remove('on');
            bar.style.display = 'none';
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
        }
    }

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
    }

    async function startEternalLoop() {
        while (guardianActive) {
            for (let i = 0; i < SPACES.length; i++) {
                if (!guardianActive) break;
                currentSpaceIdx = i;
                updateUISpace();
                await refreshData();
                await autoCleanSilence();
                await new Promise(r => setTimeout(r, 10000)); // 10s gap between spaces
            }
            if (!guardianActive) break;
            console.log("Guardian: Standing by for 5 minutes...");
            await new Promise(r => setTimeout(r, 300000)); // 5 min cooldown
        }
    }

    // 🔱 DATA ENGINE
    async function refreshData() {
        const s = SPACES[currentSpaceIdx];
        try {
            const res = await fetch(`${s.url}.json?nocache=${Date.now()}`);
            const data = await res.json();
            let temp = [];
            function traverse(obj, path = "") {
                for (let key in obj) {
                    let item = obj[key];
                    let curPath = path ? `${path}/${key}` : key;
                    if (item && typeof item === 'object') {
                        const vUrl = item.clean || item.original_url || item.url;
                        if (vUrl) {
                            temp.push({ id: key, dbPath: curPath, clean: vUrl, thumb: item.thumb || item.thumbnailUrl || 'https://via.placeholder.com/300x169/111/333?text=G-GHOST', prompt: item.prompt || 'Untitled_Asset', time: item.timestamp || 0 });
                        } else traverse(item, curPath);
                    }
                }
            }
            if(data) traverse(data);
            masterData = temp.sort((a,b) => b.time - a.time);
            document.getElementById('total-count').innerText = masterData.length + " ASSETS SECURED";
            if(!guardianActive) renderView();
        } catch (e) { document.getElementById('total-count').innerText = "CONNECTION ERROR"; }
    }

    function renderView() {
        const feed = document.getElementById('video-feed');
        feed.innerHTML = "";
        masterData.forEach(item => {
            const isSelected = queue.some(q => q.id === item.id);
            const isLooted = lootedHistory.includes(item.id);
            const card = document.createElement('div');
            card.className = `video-card ${isSelected ? 'selected' : ''} ${isLooted ? 'is-looted' : ''}`;
            card.onclick = () => toggleSelect(item.id);
            card.innerHTML = `
                ${isLooted ? '<div class="badge-looted">SECURED</div>' : ''}
                <div class="thumb-container"><img class="thumb-img" src="${item.thumb}" loading="lazy"></div>
                <div class="video-meta">${item.prompt}</div>
            `;
            feed.appendChild(card);
        });
    }

    // 🔱 SELECTION LOGIC
    function toggleSelect(id) {
        const item = masterData.find(m => m.id === id);
        const idx = queue.findIndex(q => q.id === id);
        if(idx > -1) queue.splice(idx, 1); else queue.push(item);
        updateQueueUI();
    }

    function selectAll() {
        queue = [...masterData];
        updateQueueUI();
    }

    function clearQueue() {
        queue = [];
        updateQueueUI();
    }

    function updateQueueUI() {
        document.getElementById('q-count').innerText = queue.length;
        renderView();
    }

    // 🔱 ACTION ENGINE (Zip / Export / Purge)
    async function downloadZipTurbo() {
        if(queue.length === 0) return alert("Select targets first!");
        const zip = new JSZip();
        const overlay = document.getElementById('progress-overlay');
        const fill = document.getElementById('pg-fill');
        const status = document.getElementById('pg-status');
        
        overlay.style.display = 'flex';
        let success = 0;

        for(let i=0; i < queue.length; i++) {
            const item = queue[i];
            status.innerHTML = `FETCHING ASSET ${i+1}/${queue.length}<br>${item.prompt.substring(0,30)}...`;
            try {
                const res = await fetch(item.clean);
                if(!res.ok) throw "Dead";
                const blob = await res.blob();
                zip.file(`${item.prompt.substring(0,20).replace(/[^a-z0-9]/gi,'_')}_${i}.mp4`, blob);
                success++;
                if(!lootedHistory.includes(item.id)) lootedHistory.push(item.id);
            } catch (e) { console.log("Failed:", item.id); }

            let p = Math.round(((i+1) / queue.length) * 100);
            fill.style.width = p + '%';
            document.getElementById('pg-percent').innerText = p + '%';
        }

        if(success > 0) {
            status.innerText = "PACKING ENCRYPTED ZIP...";
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `GHOST_STRIKE_${Date.now()}.zip`;
            link.click();
            localStorage.setItem('ghost_looted_v29', JSON.stringify(lootedHistory));
        }
        overlay.style.display = 'none';
        clearQueue();
    }

    function exportLinks() {
        const list = masterData.map(i => `${i.prompt}\n${i.clean}\n`).join('\n---\n');
        const blob = new Blob([list], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `GHOST_LINKS_${SPACES[currentSpaceIdx].name}.txt`;
        a.click();
    }

    async function autoCleanSilence() {
        for(let item of masterData) {
            if(!guardianActive && !document.getElementById('progress-overlay').style.display) break;
            try {
                const res = await fetch(item.clean, { method: 'HEAD' });
                if(!res.ok) throw "Dead";
            } catch (e) {
                await fetch(`${SPACES[currentSpaceIdx].url}/${item.dbPath}.json`, { method: 'DELETE' });
            }
        }
    }

    async function cleanDeadLinks() {
        if(!confirm("Start manual purge of dead links?")) return;
        document.getElementById('progress-overlay').style.display = 'flex';
        document.getElementById('pg-status').innerText = "MANUAL PURGE INITIATED...";
        await autoCleanSilence();
        document.getElementById('progress-overlay').style.display = 'none';
        refreshData();
    }

    function switchSpace() {
        currentSpaceIdx = currentSpaceIdx === 0 ? 1 : 0;
        updateUISpace();
        clearQueue();
        refreshData();
    }

    function updateUISpace() {
        const s = SPACES[currentSpaceIdx];
        document.getElementById('current-space-name').innerText = s.name;
        document.getElementById('current-space-name').style.color = s.color;
        document.documentElement.style.setProperty('--neon', s.color);
    }

    // Initialize
    refreshData();
</script>
</body>
</html>
